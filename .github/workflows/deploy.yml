- name: Deploy via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USERNAME: ${{ secrets.VPS_USERNAME }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: |
          # 1. Setup the private key safely
          mkdir -p ~/.ssh
          
          # Use a heredoc to write the key exactly as it is in the secret, 
          # preserving all newlines perfectly.
          cat << 'KEY_EOF' > ~/.ssh/id_ed25519
          ${PRIVATE_KEY}
          KEY_EOF
          
          # Remove any potential Windows carriage returns just in case
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # 2. Prevent the "Host verification failed" error
          # ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          # 3. Run commands on the VPS
          ssh -i ~/.ssh/id_ed25519 "$USERNAME@$HOST" MONGO_URL="$MONGO_URL" bash -s << 'EOF'
            cd /app/backend/cigaroElectro_backend
            git pull origin main
            echo "MONGO_URL=$MONGO_URL" > .env
            echo "PORT=3005" >> .env
            docker compose up -d --build --remove-orphans
            docker image prune -f
          EOF