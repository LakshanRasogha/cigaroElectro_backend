name: Deploy Backend to VPS

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USERNAME: ${{ secrets.VPS_USERNAME }}
        run: |
          # 1. Setup the private key safely and remove Windows carriage returns
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. Prevent the "Host verification failed" error
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

          # 3. Run your commands on the VPS
          ssh -i ~/.ssh/id_rsa "$USERNAME@$HOST" << 'EOF'
            cd /app/backend/cigaroElectro_backend
            git pull origin main
            docker compose up -d --build
          EOF